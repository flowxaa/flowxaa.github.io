<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>abc</title>
    <script src="common/js/jquery-1.12.3.min.js"></script>
<script >

    $.ajax({
        url: 's.json',
        dataType: 'json',
        success: function (data) {
            // 在此处处理数据
            json = data.data;
           // alert(data.data)
            for (let key in json) {
                // 判断属性是否是对象自身的属性而非继承的属性
                if (json.hasOwnProperty(key)) {
                   // console.log(key + ": " + json[key].url);
                }
            }
            var html = "";
            for (let key in json) {
                html += "<li><a href=\"http://www.flowx.cn/flv.html?key=" + json[key].url + "\">" + json[key].id+ " </a></li>";
            }
            var form = document.getElementById("wxPay");
            form.innerHTML = html;

        },
        error: function (xhr, status, error) {
            console.error('读取JSON文件时发生错误：', error);
        }
    });


  
</script>
</head>
<body>
     <h2>abc</h2> 
    <form id="wxPay" method="get" >


    </form>
<ul>
    
</ul>

</body>
</html>
